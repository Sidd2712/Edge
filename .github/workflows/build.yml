name: Android Build

on:
  push:
    branches: [ "main" , "version2"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. This installs Gradle on the cloud server automatically
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> local.properties
          echo "JWT_TOKEN=${{ secrets.JWT_TOKEN }}" >> local.properties
          echo "ACCOUNT_UUID=${{ secrets.ACCOUNT_UUID }}" >> local.properties

      # 2. We use 'gradle' instead of './gradlew'
      - name: Build with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: finance-bridge-app
          path: app/build/outputs/apk/debug/app-debug.apk